name: Keep Render and NeonDB Alive

on:
  schedule:
    - cron: "*/4 * * * *"  # Runs every 4 minutes
  workflow_dispatch:  # Allows manual trigger

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: curl -m 5 https://titan-api-ffre.onrender.com || echo "Render API might be down"

      - name: Keep NeonDB Active
        env:
          DATABASE_URL: "postgres://neondb_owner:npg_tzFEWJQVe30i@ep-misty-flower-a8djo7lt-pooler.eastus2.azure.neon.tech/neondb?sslmode=require"
        run: |
          sudo apt-get install -y postgresql-client
          psql "$DATABASE_URL" -c "SELECT 1;" || echo "NeonDB might be down"
